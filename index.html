<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSS Questionnaire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .lang-label {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }

        .lang-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lang-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .lang-btn:active {
            transform: scale(0.97);
        }

        .lang-btn-hindi {
            background: #1a1a2e;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(26, 26, 46, 0.3);
        }

        .lang-btn-english {
            background: linear-gradient(135deg, #f7971e 0%, #e8750a 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Mantraksh PSS Feedback Questionnaire</h1>
            <p>PSS प्रतिक्रिया प्रश्नावली</p>
        </div>

        <span class="lang-label">Select your language / भाषा चुनें</span>

        <div class="lang-buttons">
            <button class="lang-btn lang-btn-hindi" onclick="goToForm('hindi')">
                हिन्दी में शुरू करें
            </button>
            <div class="divider">or</div>
            <button class="lang-btn lang-btn-english" onclick="goToForm('english')">
                Start in English
            </button>
        </div>
    </div>

    <script>
        const FORM_URLS = {
            english: 'https://docs.google.com/forms/d/e/1FAIpQLSeFRHH5WN0k3T9WZALpeKvypfJ3y_t0PXEVewLUokXHHk40bg/viewform',
            hindi: 'YOUR_HINDI_FORM_URL_HERE'
        };

        function goToForm(lang) {
            window.location.href = FORM_URLS[lang];
        }
    </script>
</body>
</html>
